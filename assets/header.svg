<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" fill="none" role="img" aria-label="Alan — Back-end-focused full-stack software engineer, Chicago IL">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a0f1e"/>
      <stop offset="0.55" stop-color="#0d1428"/>
      <stop offset="1" stop-color="#0b1122"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(1010 70) rotate(130) scale(360 380)" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#3b82f6" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="name" x1="64" y1="150" x2="470" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e8eefc"/>
      <stop offset="0.6" stop-color="#a5b4fc"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="rule" x1="64" y1="0" x2="470" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#ffffff" fill-opacity="0.035"/>
    </pattern>
    <style>
      .sans { font-family: ui-sans-serif, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
      .mono { font-family: ui-monospace, "SFMono-Regular", "Cascadia Code", "Consolas", monospace; }
    </style>
  </defs>

  <rect width="1200" height="320" rx="20" fill="url(#bg)"/>
  <rect width="1200" height="320" rx="20" fill="url(#dots)"/>
  <rect width="1200" height="320" rx="20" fill="url(#glow)"/>
  <rect x="0.5" y="0.5" width="1199" height="319" rx="19.5" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>

  <!-- Left column -->
  <text x="66" y="78" class="mono" font-size="15" letter-spacing="4" fill="#f59e0b" fill-opacity="0.9">CHICAGOLAND SOFTWARE</text>
  <text x="63" y="168" class="sans" font-size="104" font-weight="700" letter-spacing="-2" fill="url(#name)">Alan</text>
  <rect x="66" y="192" width="150" height="4" rx="2" fill="url(#rule)"/>
  <text x="66" y="228" class="sans" font-size="25" font-weight="600" fill="#dbe4f5">Back-end-focused full-stack software engineer</text>
  <text x="66" y="264" class="sans" font-size="17" fill="#8ea0bd">Secure, production software across healthcare &amp; fintech.</text>

  <!-- meta chips -->
  <g class="sans" font-size="14.5" font-weight="600">
    <rect x="66" y="284" width="118" height="27" rx="13.5" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.09"/>
    <text x="86" y="302" fill="#c7d2e8">📍 Chicago, IL</text>
    <rect x="196" y="284" width="170" height="27" rx="13.5" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.09"/>
    <text x="216" y="302" fill="#c7d2e8">🛠 5+ yrs in production</text>
    <rect x="378" y="284" width="228" height="27" rx="13.5" fill="#22c55e" fill-opacity="0.10" stroke="#22c55e" stroke-opacity="0.35"/>
    <circle cx="398" cy="298" r="4" fill="#22c55e"/>
    <text x="410" y="302" fill="#86efac">Open to senior / staff roles</text>
  </g>

  <!-- Right column: terminal decode card -->
  <g transform="translate(742 60)">
    <rect x="0" y="0" width="392" height="200" rx="14" fill="#070b16" fill-opacity="0.72" stroke="#ffffff" stroke-opacity="0.10"/>
    <circle cx="26" cy="26" r="6" fill="#ef4444" fill-opacity="0.85"/>
    <circle cx="48" cy="26" r="6" fill="#f59e0b" fill-opacity="0.85"/>
    <circle cx="70" cy="26" r="6" fill="#22c55e" fill-opacity="0.85"/>
    <text x="200" y="31" text-anchor="middle" class="mono" font-size="12.5" fill="#5b6b86">~/whoami</text>
    <line x1="0" y1="48" x2="392" y2="48" stroke="#ffffff" stroke-opacity="0.08"/>
    <g class="mono" font-size="15.5">
      <text x="24" y="82" fill="#5b6b86">$ <tspan fill="#e8eefc">echo</tspan> <tspan fill="#f59e0b">0x416c616e</tspan></text>
      <text x="24" y="112" fill="#8ea0bd">   41  6c  61  6e</text>
      <text x="24" y="136" fill="#8ea0bd">   <tspan fill="#818cf8">A</tspan>   <tspan fill="#818cf8">l</tspan>   <tspan fill="#818cf8">a</tspan>   <tspan fill="#818cf8">n</tspan></text>
      <text x="24" y="170" fill="#5b6b86">$ <tspan fill="#22c55e">Alan</tspan><tspan fill="#22c55e" font-weight="700">_</tspan></text>
    </g>
  </g>
</svg>
